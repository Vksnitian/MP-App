<!-- Firebase SDK -->
<script>
// ═══════════════════════════════════════
//  M·P SYSTEM — Secure API Mode
//  Firebase keys hidden on server
// ═══════════════════════════════════════

// Change this to your Render.com URL after deployment
const API_URL = 'https://mp-app-backend.onrender.com'; 

let _TOKEN = null;

// ── API Helper ──
async function apiCall(method, path, body=null){
  const opts = {
    method,
    headers: { 'Content-Type':'application/json' }
  };
  if(_TOKEN) opts.headers['Authorization'] = 'Bearer ' + _TOKEN;
  if(body)   opts.body = JSON.stringify(body);
  const res  = await fetch(API_URL + path, opts);
  const data = await res.json();
  if(!res.ok) throw { status: res.status, ...data };
  return data;
}

// ── Firebase-style wrapper functions (same API as before) ──
async function fbGet(path){
  return await apiCall('GET', '/api/db/' + path);
}
async function fbSet(path, data){
  return await apiCall('POST', '/api/db/' + path, { data });
}
async function fbUpdate(path, data){
  return await apiCall('POST', '/api/db/' + path + '?method=update', { data });
}
async function fbPush(path, data){
  const r = await apiCall('POST', '/api/db/' + path + '?method=push', { data });
  return r.key;
}
async function fbRemove(path){
  return await apiCall('DELETE', '/api/db/' + path);
}
// fbListen — polling fallback (real-time not needed for this app)
function fbListen(path, cb){
  cb(null); // initial empty call
  setInterval(async ()=>{
    try{ cb(await fbGet(path)); }catch(e){}
  }, 10000); // poll every 10s
}

// Dispatch ready event
document.addEventListener('DOMContentLoaded', ()=>{
  document.dispatchEvent(new Event('firebase-ready'));
});
window._db = { ready: true };
</script>

<style>
:root{
  --bg:#080e18;--bg2:#0d1623;--panel:#111d2e;--card:#162336;--card2:#1c2d42;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --m1:#f97316;--m1bg:rgba(249,115,22,.13);
  --m2:#fb923c;--m2bg:rgba(251,146,60,.10);
  --s1:#38bdf8;--s1bg:rgba(56,189,248,.10);
  --s2:#60a5fa;--s2bg:rgba(96,165,250,.10);
  --sup:#a3e635;--supbg:rgba(163,230,53,.10);
  --mgr:#e879f9;--mgrbg:rgba(232,121,249,.10);
  --day:#fbbf24;--daybg:rgba(251,191,36,.13);
  --night:#818cf8;--nightbg:rgba(129,140,248,.13);
  --off:#475569;--offbg:rgba(71,85,105,.16);
  --lv:#f43f5e;--lvbg:rgba(244,63,94,.13);
  --co:#facc15;--cobg:rgba(250,204,21,.13);
  --gen:#94a3b8;--genbg:rgba(148,163,184,.11);
  --green:#22c55e;--greenbg:rgba(34,197,94,.11);
  --text:#dde8f2;--muted:#4e6278;--muted2:#7a9ab8;
  --radius:14px;--radius-sm:9px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{
  font-family:'Noto Sans Devanagari',sans-serif;
  background:var(--bg);color:var(--text);
  max-width:480px;margin:0 auto;min-height:100vh;
  overflow-x:hidden;padding-bottom:90px;
}

/* ══ LOADING ══ */
#loadingScreen{
  position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.load-logo{font-family:'Barlow Condensed',sans-serif;font-size:64px;font-weight:900;
  background:linear-gradient(135deg,#f97316,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.load-text{font-size:14px;color:var(--muted2);letter-spacing:1px;}
.load-bar{width:180px;height:3px;background:var(--card2);border-radius:2px;overflow:hidden;}
.load-fill{height:100%;background:linear-gradient(90deg,var(--m1),var(--s1));border-radius:2px;animation:loadFill 2s ease-in-out forwards;}
@keyframes loadFill{from{width:0}to{width:100%}}

/* ══ LOGIN SCREEN ══ */
#loginScreen{
  display:none;position:fixed;inset:0;z-index:500;
  background:var(--bg);flex-direction:column;align-items:center;
  justify-content:center;padding:24px 20px;overflow-y:auto;
}
#loginScreen.show{display:flex;}
.login-header{text-align:center;margin-bottom:28px;}
.login-logo-text{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;
  background:linear-gradient(135deg,#f97316,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.login-title{font-size:20px;font-weight:800;color:#fff;margin-top:6px;}
.login-sub{font-size:13px;color:var(--muted2);margin-top:4px;}
.login-card{background:var(--panel);border:1px solid var(--border2);border-radius:20px;padding:24px 20px;width:100%;max-width:360px;}
.login-type-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.ltype-btn{
  padding:14px 10px;border-radius:12px;border:2px solid var(--border2);
  background:var(--card);cursor:pointer;text-align:center;transition:all .2s;
}
.ltype-btn.active{border-color:var(--m1);background:var(--m1bg);}
.ltype-btn .ltype-icon{font-size:24px;margin-bottom:4px;}
.ltype-btn .ltype-label{font-size:12px;font-weight:700;color:var(--text);}
.ltype-btn .ltype-sub{font-size:10px;color:var(--muted2);margin-top:2px;}
.inp-group{margin-bottom:14px;}
.inp-label{font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block;}
.inp-field{
  width:100%;padding:15px 16px;background:var(--card);
  border:2px solid var(--border2);border-radius:12px;
  color:#fff;font-size:16px;font-family:'Noto Sans Devanagari',sans-serif;
  outline:none;transition:border-color .2s;
}
.inp-field:focus{border-color:var(--m1);}
.inp-field.error{border-color:var(--lv);}
.big-btn{
  width:100%;padding:18px;border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--m1),#c2410c);
  color:#fff;font-family:'Noto Sans Devanagari',sans-serif;
  font-size:18px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 20px rgba(249,115,22,.3);
  transition:transform .1s,box-shadow .2s;
  margin-top:4px;
  min-height:56px;
}
.big-btn:active{transform:scale(.97);}
.big-btn.blue{background:linear-gradient(135deg,var(--s1),#0369a1);box-shadow:0 4px 20px rgba(56,189,248,.25);}
.big-btn.green{background:linear-gradient(135deg,var(--green),#15803d);box-shadow:0 4px 20px rgba(34,197,94,.25);}
.big-btn.red{background:linear-gradient(135deg,var(--lv),#9f1239);box-shadow:0 4px 20px rgba(244,63,94,.25);}
.big-btn.gray{background:var(--card2);box-shadow:none;color:var(--text);}
.err-msg{
  display:none;background:var(--lvbg);border:1px solid rgba(244,63,94,.3);
  border-radius:10px;padding:12px;margin-bottom:12px;
  font-size:13px;color:var(--lv);text-align:center;font-weight:600;
}
.err-msg.show{display:block;}
.pending-box{
  display:none;background:var(--panel);border:2px solid rgba(251,191,36,.3);
  border-radius:16px;padding:20px;margin-top:16px;width:100%;max-width:360px;text-align:center;
}
.pending-box.show{display:block;}

/* ══ HEADER ══ */
.hdr{
  background:var(--bg2);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;}
.hdr-brand{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:#fff;line-height:1;}
.hdr-brand span{color:var(--m1);}
.hdr-right{display:flex;align-items:center;gap:10px;}
.notif-btn{
  width:46px;height:46px;border-radius:12px;background:var(--card);
  border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;font-size:22px;
}
.notif-badge{
  position:absolute;top:-5px;right:-5px;width:20px;height:20px;
  background:var(--lv);border-radius:50%;font-size:11px;font-weight:900;
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;
}
.user-chip{
  display:flex;align-items:center;gap:9px;background:var(--card);
  border:1px solid var(--border2);border-radius:12px;padding:7px 14px 7px 7px;cursor:pointer;
}
.user-av{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:#fff;
}
.role-tag{font-size:10px;font-weight:800;padding:3px 8px;border-radius:5px;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase;}
.role-tag.admin{background:var(--mgrbg);color:var(--mgr);}
.role-tag.user{background:var(--supbg);color:var(--sup);}
.sync-row{
  display:flex;align-items:center;gap:6px;padding:5px 14px;
  background:rgba(34,197,94,.06);border-bottom:1px solid rgba(34,197,94,.1);
  font-size:11px;color:var(--green);font-weight:700;
}
/* Learn bar — full width below sync row */
.learn-hdr-bar{
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,rgba(168,85,247,.14),rgba(124,58,237,.08));
  border-bottom:1px solid rgba(168,85,247,.25);
  padding:0;
}
.learn-hdr-btn{
  width:100%;padding:11px 16px;border:none;cursor:pointer;
  background:transparent;color:#fff;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:'Noto Sans Devanagari',sans-serif;font-size:15px;font-weight:900;
  transition:background .15s;
}
.learn-hdr-btn:active{background:rgba(168,85,247,.2);}
/* ══ NAV ══ */
.nav{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
.nav::-webkit-scrollbar{display:none;}
.nb{
  flex:1;min-width:52px;border:none;background:none;
  color:var(--muted);font-family:'Noto Sans Devanagari',sans-serif;
  font-size:11px;font-weight:800;padding:10px 4px 10px;
  border-bottom:3px solid transparent;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s;
  position:relative;
}
.nb svg{width:24px;height:24px;}
.nb.on{color:var(--m1);border-bottom-color:var(--m1);}
.nb-badge{
  position:absolute;top:6px;right:6px;min-width:16px;height:16px;
  background:var(--lv);border-radius:8px;font-size:9px;font-weight:900;
  color:#fff;display:flex;align-items:center;justify-content:center;padding:0 3px;
  font-family:'Barlow Condensed',sans-serif;
}

/* ══ MAIN ══ */
.main{padding:16px;}
.tab{display:none;}.tab.on{display:block;}

/* ══ PAGE TITLE ══ */
.page-title{
  font-size:24px;font-weight:900;color:#fff;margin-bottom:6px;
}
.page-sub{font-size:12px;color:var(--muted2);margin-bottom:16px;}

/* ══ STATS GRID ══ */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px 10px;text-align:center;}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;line-height:1;}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:5px;font-weight:700;}

/* ══ SECTION CARD ══ */
.sec-card{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;
}
.sec-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.sec-name{font-size:16px;font-weight:800;margin-bottom:3px;}
.sec-machine{font-size:11px;color:var(--muted2);}
.sec-count{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;text-align:right;line-height:1;}
.sec-count-lbl{font-size:10px;color:var(--muted);text-align:right;}
.warning-dot{width:8px;height:8px;border-radius:50%;background:var(--lv);display:inline-block;margin-right:4px;}

/* ══ CARD ══ */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.card-row{display:flex;align-items:flex-start;gap:12px;}
.card-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.card-body{flex:1;min-width:0;}
.card-name{font-size:16px;font-weight:800;color:#fff;margin-bottom:4px;}
.card-sub{font-size:13px;color:var(--muted2);}
.card-meta{font-size:11px;color:var(--muted);margin-top:4px;}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}

/* ══ BADGES ══ */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:5px;
  font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase;}
.badge.pending{background:var(--daybg);color:var(--day);}
.badge.approved{background:var(--greenbg);color:var(--green);}
.badge.rejected{background:var(--lvbg);color:var(--lv);}
.badge.M1{background:var(--m1bg);color:var(--m1);}
.badge.M2{background:var(--m2bg);color:var(--m2);}
.badge.S1{background:var(--s1bg);color:var(--s1);}
.badge.S2{background:var(--s2bg);color:var(--s2);}
.badge.SUP{background:var(--supbg);color:var(--sup);}
.badge.MGR{background:var(--mgrbg);color:var(--mgr);}

/* ══ SHIFT CELL ══ */
.shc{display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:26px;border-radius:6px;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;}
.shc.D{background:var(--daybg);color:var(--day);}
.shc.N{background:var(--nightbg);color:var(--night);}
.shc.O{background:var(--offbg);color:var(--off);}
.shc.L{background:var(--lvbg);color:var(--lv);}
.shc.CO{background:var(--cobg);color:var(--co);font-size:9px;}
.shc.G{background:var(--genbg);color:var(--gen);}
.shc.GP{background:var(--supbg);color:var(--sup);font-size:9px;}
.shc.H,.shc.HLF{background:var(--m1bg);color:var(--m1);font-size:9px;}
.shc.Ab{background:var(--lvbg);color:var(--lv);}

/* ══ ACTION BUTTONS ══ */
.action-row{display:flex;gap:8px;margin-top:10px;}
.act-btn{flex:1;padding:14px 8px;border:none;border-radius:10px;font-family:'Noto Sans Devanagari',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:transform .1s;min-height:48px;}
.act-btn:active{transform:scale(.96);}
.act-btn.approve{background:var(--greenbg);color:var(--green);}
.act-btn.reject{background:var(--lvbg);color:var(--lv);}
.act-btn.edit{background:rgba(96,165,250,.12);color:var(--s2);}
.act-btn.del{background:rgba(244,63,94,.12);color:var(--lv);}

/* ══ SECTION TITLE ══ */
.stitle{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--muted);margin:18px 0 10px;display:flex;align-items:center;gap:8px;
}
.stitle::after{content:'';flex:1;height:1px;background:var(--border);}

/* ══ FILTER CHIPS ══ */
.chips{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;padding:10px 16px;border-radius:10px;
  border:1px solid var(--border2);background:var(--panel);
  color:var(--muted2);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;
  min-height:40px;display:flex;align-items:center;
}
.chip.on{background:var(--m1);border-color:var(--m1);color:#fff;}

/* ══ SCHEDULE TABLE ══ */
.sched-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sched-lbl{font-size:14px;font-weight:800;color:#fff;}
.nav-btn{width:36px;height:36px;border:1px solid var(--border2);background:var(--panel);
  border-radius:8px;color:var(--text);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;}
.day-strip{overflow-x:auto;margin-bottom:10px;}
.day-strip::-webkit-scrollbar{height:3px;}
.day-strip-inner{display:flex;gap:5px;}
.dsbox{flex-shrink:0;width:42px;background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:6px 3px;text-align:center;}
.dsbox.today{border-color:rgba(249,115,22,.5);background:rgba(249,115,22,.08);}
.dsbox-day{font-size:9px;font-weight:700;color:var(--muted);font-family:'Barlow Condensed',sans-serif;}
.dsbox-date{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;}
.dsbox-d{font-size:10px;font-weight:700;color:var(--day);}
.dsbox-n{font-size:10px;font-weight:700;color:var(--night);}
.sched-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);}
.sched-wrap::-webkit-scrollbar{height:4px;}
.sched-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.sched-tbl{border-collapse:collapse;min-width:580px;width:100%;}
.sched-tbl th{background:var(--card2);padding:8px 4px;font-family:'Barlow Condensed',sans-serif;
  font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
  color:var(--muted2);white-space:nowrap;border-bottom:1px solid var(--border2);}
.sched-tbl th.ecol{text-align:left;padding-left:10px;min-width:110px;}
.sched-tbl td{padding:6px 3px;border-bottom:1px solid var(--border);vertical-align:middle;text-align:center;}
.sched-tbl td.ecol{text-align:left;padding:8px 10px;}
.sec-row{background:var(--bg2);border-top:1px solid var(--border2);}
.sec-row-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;
  letter-spacing:1.5px;text-transform:uppercase;padding:5px 10px;display:block;}
.emp-nm{font-size:12px;font-weight:700;color:#fff;}
.emp-id{font-size:9px;color:var(--muted);}
.my-row{background:rgba(249,115,22,.05)!important;}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted2);}

/* ══ MY SHIFT ══ */
.my-shift-hero{
  background:linear-gradient(135deg,rgba(249,115,22,.2),rgba(96,165,250,.15));
  border:1px solid rgba(249,115,22,.3);border-radius:var(--radius);padding:20px;margin-bottom:16px;
}
.my-shift-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;}
.shift-day-card{background:rgba(0,0,0,.3);border-radius:12px;padding:14px;text-align:center;}
.shift-day-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-weight:700;}
.shift-icon{width:54px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;margin:0 auto 6px;}
.mini-cal{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:4px;}
.mini-day{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:6px 3px;text-align:center;}
.mini-day.today{border-color:rgba(249,115,22,.5);background:rgba(249,115,22,.08);}

/* ══ FORM / MODAL ══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;
  backdrop-filter:blur(6px);align-items:flex-end;}
.overlay.open{display:flex;}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 16px 44px;
  width:100%;max-height:94vh;overflow-y:auto;
  animation:slideUp .28s cubic-bezier(.32,0,.15,1);border-top:1px solid var(--border2);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:32px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:20px;font-weight:900;color:#fff;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted2);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.field input,.field select,.field textarea{
  width:100%;padding:16px 16px;background:var(--card);border:2px solid var(--border2);
  border-radius:12px;color:#fff;font-size:16px;font-family:'Noto Sans Devanagari',sans-serif;
  outline:none;appearance:none;transition:border-color .2s;
  min-height:54px;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--m1);}
.field select option{background:var(--bg2);}
.field textarea{resize:none;height:90px;}
